name: Benchmark ‚Äî Serial vs Parallel + Assembly Equivalence

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'Public GitHub repo URL (e.g. https://github.com/serde-rs/serde)'
        required: true
        type: string
      repo_branch:
        description: 'Branch to checkout (leave blank for default branch)'
        required: false
        default: ''
        type: string
      manifest_path:
        description: 'Path to Cargo.toml relative to repo root (default: Cargo.toml)'
        required: false
        default: 'Cargo.toml'
        type: string
      rust_toolchain:
        description: 'Rust toolchain (default: stable)'
        required: false
        default: 'stable'
        type: string

env:
  # Strip absolute paths from debug info so serial vs parallel ASM is comparable
  RUSTFLAGS: "--remap-path-prefix=${{ github.workspace }}=."
  CARGO_TERM_COLOR: always

jobs:
  # ‚îÄ‚îÄ Job 1: Serial build ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  serial-build:
    name: Serial Build (-j1)
    runs-on: ubuntu-latest
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust_toolchain }}

      - name: Clone target repo
        run: |
          if [ -n "${{ inputs.repo_branch }}" ]; then
            git clone --depth 1 --branch ${{ inputs.repo_branch }} ${{ inputs.repo_url }} target-repo
          else
            git clone --depth 1 ${{ inputs.repo_url }} target-repo
          fi

      - name: Build serial + emit ASM
        working-directory: target-repo
        run: |
          RUSTFLAGS="--remap-path-prefix=$(pwd)=. --remap-path-prefix=$HOME=~" \
            cargo build --release -j1 \
            --manifest-path ${{ inputs.manifest_path }} \
            2>&1

          START=$SECONDS
          RUSTFLAGS="--remap-path-prefix=$(pwd)=. --remap-path-prefix=$HOME=~" \
            cargo build --release -j1 \
            --manifest-path ${{ inputs.manifest_path }} 2>&1
          echo "SERIAL_S=$((SECONDS - START))" >> serial-timing.txt

          # Emit ASM for all workspace crates
          RUSTFLAGS="--remap-path-prefix=$(pwd)=. --remap-path-prefix=$HOME=~ --emit=asm" \
            cargo build --release -j1 \
            --manifest-path ${{ inputs.manifest_path }} 2>&1 || true

          # Collect .s files
          mkdir -p serial-asm
          find target/release/deps -name "*.s" | sort | while read f; do
            base=$(basename "$f")
            # Strip hash suffix for stable names: lib_name-HASH.s ‚Üí lib_name.s
            clean=$(echo "$base" | sed 's/-[a-f0-9]\{16\}\.s$/.s/')
            cp "$f" "serial-asm/${clean}"
          done
          echo "ASM files: $(ls serial-asm | wc -l)"

          SERIAL_S=$(cat serial-timing.txt | grep SERIAL_S | cut -d= -f2)
          echo "## Serial Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** ${SERIAL_S}s" >> $GITHUB_STEP_SUMMARY
          echo "- **ASM files:** $(ls serial-asm | wc -l)" >> $GITHUB_STEP_SUMMARY

      - name: Upload serial artifacts
        uses: actions/upload-artifact@v4
        with:
          name: serial
          path: |
            target-repo/serial-timing.txt
            target-repo/serial-asm/

  # ‚îÄ‚îÄ Job 2: Parallel build ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  parallel-build:
    name: Parallel Build (default -j)
    runs-on: ubuntu-latest
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust_toolchain }}

      - name: Clone target repo
        run: |
          if [ -n "${{ inputs.repo_branch }}" ]; then
            git clone --depth 1 --branch ${{ inputs.repo_branch }} ${{ inputs.repo_url }} target-repo
          else
            git clone --depth 1 ${{ inputs.repo_url }} target-repo
          fi

      - name: Build parallel + emit ASM
        working-directory: target-repo
        run: |
          CPUS=$(nproc)
          echo "CPUS=${CPUS}" >> parallel-timing.txt

          START=$SECONDS
          RUSTFLAGS="--remap-path-prefix=$(pwd)=. --remap-path-prefix=$HOME=~" \
            cargo build --release \
            --manifest-path ${{ inputs.manifest_path }} 2>&1
          echo "PARALLEL_S=$((SECONDS - START))" >> parallel-timing.txt

          # Emit ASM
          RUSTFLAGS="--remap-path-prefix=$(pwd)=. --remap-path-prefix=$HOME=~ --emit=asm" \
            cargo build --release \
            --manifest-path ${{ inputs.manifest_path }} 2>&1 || true

          mkdir -p parallel-asm
          find target/release/deps -name "*.s" | sort | while read f; do
            base=$(basename "$f")
            clean=$(echo "$base" | sed 's/-[a-f0-9]\{16\}\.s$/.s/')
            cp "$f" "parallel-asm/${clean}"
          done
          echo "ASM files: $(ls parallel-asm | wc -l)"

          PARALLEL_S=$(grep PARALLEL_S parallel-timing.txt | cut -d= -f2)
          echo "## Parallel Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** ${PARALLEL_S}s (${CPUS} CPUs)" >> $GITHUB_STEP_SUMMARY
          echo "- **ASM files:** $(ls parallel-asm | wc -l)" >> $GITHUB_STEP_SUMMARY

      - name: Upload parallel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: parallel
          path: |
            target-repo/parallel-timing.txt
            target-repo/parallel-asm/

  # ‚îÄ‚îÄ Job 3: Phase analysis ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  phase-analysis:
    name: Phase Analysis (parallel-rustc plan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout parallel-rustc
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust_toolchain }}

      - name: Build parallel-rustc
        run: cargo build --release

      - name: Clone target repo
        run: |
          if [ -n "${{ inputs.repo_branch }}" ]; then
            git clone --depth 1 --branch ${{ inputs.repo_branch }} ${{ inputs.repo_url }} target-repo
          else
            git clone --depth 1 ${{ inputs.repo_url }} target-repo
          fi

      - name: Run parallel-rustc plan
        working-directory: target-repo
        run: |
          PLAN=$(../target/release/parallel-rustc plan --manifest-path ${{ inputs.manifest_path }} 2>&1)
          echo "$PLAN"
          echo "$PLAN" > plan-full.txt

          PACKAGES=$(echo "$PLAN" | grep "^packages:" | grep -o 'packages: [0-9]*' | grep -o '[0-9]*' || echo "0")
          PHASES=$(echo "$PLAN" | grep "^packages:" | grep -o 'phases: [0-9]*' | grep -o '[0-9]*' || echo "0")
          MAX_WIDTH=0
          while IFS= read -r line; do
            if echo "$line" | grep -q "^phase .* packages"; then
              W=$(echo "$line" | grep -o '[0-9]* packages' | grep -o '[0-9]*')
              [ "${W:-0}" -gt "$MAX_WIDTH" ] && MAX_WIDTH=$W
            fi
          done < plan-full.txt

          printf "PACKAGES=%s\nPHASES=%s\nMAX_WIDTH=%s\n" "$PACKAGES" "$PHASES" "$MAX_WIDTH" > plan-stats.txt
          cat plan-stats.txt

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: plan
          path: |
            target-repo/plan-stats.txt
            target-repo/plan-full.txt

  # ‚îÄ‚îÄ Job 4: Compare timings + ASM equivalence ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  compare:
    name: Compare & Verify Equivalence
    needs: [serial-build, parallel-build, phase-analysis]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show artifact structure
        run: find artifacts -type f | sort

      - name: Parse timings + plan stats
        id: stats
        run: |
          SERIAL_S=$(grep SERIAL_S artifacts/serial/serial-timing.txt | cut -d= -f2 || echo "?")
          PARALLEL_S=$(grep PARALLEL_S artifacts/parallel/parallel-timing.txt | cut -d= -f2 || echo "?")
          CPUS=$(grep CPUS artifacts/parallel/parallel-timing.txt | cut -d= -f2 || echo "?")
          PACKAGES=$(grep PACKAGES artifacts/plan/plan-stats.txt | cut -d= -f2 || echo "?")
          PHASES=$(grep PHASES artifacts/plan/plan-stats.txt | cut -d= -f2 || echo "?")
          MAX_WIDTH=$(grep MAX_WIDTH artifacts/plan/plan-stats.txt | cut -d= -f2 || echo "?")

          if [ "$PARALLEL_S" != "?" ] && [ "$PARALLEL_S" -gt 0 ] 2>/dev/null; then
            SPEEDUP=$(echo "scale=2; $SERIAL_S / $PARALLEL_S" | bc || echo "?")
          else
            SPEEDUP="?"
          fi
          if [ "$PHASES" != "?" ] && [ "$PHASES" -gt 0 ] 2>/dev/null; then
            THEORETICAL=$(echo "scale=2; $PACKAGES / $PHASES" | bc || echo "?")
          else
            THEORETICAL="?"
          fi

          echo "SERIAL_S=$SERIAL_S" >> $GITHUB_ENV
          echo "PARALLEL_S=$PARALLEL_S" >> $GITHUB_ENV
          echo "CPUS=$CPUS" >> $GITHUB_ENV
          echo "PACKAGES=$PACKAGES" >> $GITHUB_ENV
          echo "PHASES=$PHASES" >> $GITHUB_ENV
          echo "MAX_WIDTH=$MAX_WIDTH" >> $GITHUB_ENV
          echo "SPEEDUP=$SPEEDUP" >> $GITHUB_ENV
          echo "THEORETICAL=$THEORETICAL" >> $GITHUB_ENV

      - name: Compare ASM files
        id: asm_compare
        run: |
          SERIAL_DIR=artifacts/serial/serial-asm
          PARALLEL_DIR=artifacts/parallel/parallel-asm

          SERIAL_COUNT=$(ls "$SERIAL_DIR" 2>/dev/null | wc -l)
          PARALLEL_COUNT=$(ls "$PARALLEL_DIR" 2>/dev/null | wc -l)

          echo "Serial ASM files: $SERIAL_COUNT"
          echo "Parallel ASM files: $PARALLEL_COUNT"

          IDENTICAL=0
          DIFFERENT=0
          ONLY_SERIAL=0
          ONLY_PARALLEL=0
          DIFF_DETAILS=""

          # Files in serial but not parallel
          for f in "$SERIAL_DIR"/*.s 2>/dev/null; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            if [ ! -f "$PARALLEL_DIR/$base" ]; then
              ONLY_SERIAL=$((ONLY_SERIAL + 1))
              DIFF_DETAILS="${DIFF_DETAILS}\n- Only in serial: \`$base\`"
            else
              # Compare (ignoring blank lines and comment-only lines which may vary)
              if diff <(grep -v '^\s*$\|^\s*;' "$f") \
                      <(grep -v '^\s*$\|^\s*;' "$PARALLEL_DIR/$base") \
                      > /dev/null 2>&1; then
                IDENTICAL=$((IDENTICAL + 1))
              else
                DIFFERENT=$((DIFFERENT + 1))
                FIRST_DIFF=$(diff <(grep -v '^\s*$\|^\s*;' "$f") \
                                  <(grep -v '^\s*$\|^\s*;' "$PARALLEL_DIR/$base") \
                                  | head -10)
                DIFF_DETAILS="${DIFF_DETAILS}\n- Different: \`$base\`\n\`\`\`diff\n${FIRST_DIFF}\n\`\`\`"
              fi
            fi
          done

          # Files in parallel but not serial
          for f in "$PARALLEL_DIR"/*.s 2>/dev/null; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            if [ ! -f "$SERIAL_DIR/$base" ]; then
              ONLY_PARALLEL=$((ONLY_PARALLEL + 1))
              DIFF_DETAILS="${DIFF_DETAILS}\n- Only in parallel: \`$base\`"
            fi
          done

          TOTAL_COMPARED=$((IDENTICAL + DIFFERENT))

          echo "IDENTICAL=$IDENTICAL" >> $GITHUB_ENV
          echo "DIFFERENT=$DIFFERENT" >> $GITHUB_ENV
          echo "ONLY_SERIAL=$ONLY_SERIAL" >> $GITHUB_ENV
          echo "ONLY_PARALLEL=$ONLY_PARALLEL" >> $GITHUB_ENV
          echo "TOTAL_COMPARED=$TOTAL_COMPARED" >> $GITHUB_ENV
          echo "SERIAL_COUNT=$SERIAL_COUNT" >> $GITHUB_ENV
          echo "PARALLEL_COUNT=$PARALLEL_COUNT" >> $GITHUB_ENV

          # Save diff details for report
          printf "%b" "$DIFF_DETAILS" > diff-details.txt

          if [ "$DIFFERENT" -eq 0 ] && [ "$ONLY_SERIAL" -eq 0 ] && [ "$ONLY_PARALLEL" -eq 0 ]; then
            echo "ASM_VERDICT=‚úÖ IDENTICAL" >> $GITHUB_ENV
          else
            echo "ASM_VERDICT=‚öÝÔ∏è DIFFERENCES FOUND" >> $GITHUB_ENV
          fi

      - name: Generate summary report
        run: |
          DIFF_CONTENT=$(cat diff-details.txt 2>/dev/null || echo "none")
          PLAN_CONTENT=$(cat artifacts/plan/plan-full.txt 2>/dev/null || echo "plan unavailable")

          cat >> $GITHUB_STEP_SUMMARY << REPORT
          # üèÅ Benchmark Results

          **Target:** \`${{ inputs.repo_url }}\`
          **Branch:** \`${{ inputs.repo_branch || 'default' }}\`
          **Manifest:** \`${{ inputs.manifest_path }}\`
          **Toolchain:** \`${{ inputs.rust_toolchain }}\`
          **Runner CPUs:** ${{ env.CPUS }}

          ---

          ## ‚è±Ô∏è Build Timings

          | Mode | Time | Notes |
          |---|---|---|
          | Serial (\`-j1\`) | **${{ env.SERIAL_S }}s** | Single-threaded baseline |
          | Parallel (default) | **${{ env.PARALLEL_S }}s** | Cargo's built-in parallelism |
          | **Actual speedup** | **${{ env.SPEEDUP }}√ó** | |

          ---

          ## üî¨ Assembly Equivalence

          > Verifies that serial and parallel builds produce identical machine code.
          > Strips path noise with \`--remap-path-prefix\`. Ignores blank lines and ASM comments.

          **Verdict: ${{ env.ASM_VERDICT }}**

          | Metric | Count |
          |---|---|
          | Serial ASM files | ${{ env.SERIAL_COUNT }} |
          | Parallel ASM files | ${{ env.PARALLEL_COUNT }} |
          | Compared | ${{ env.TOTAL_COMPARED }} |
          | ‚úÖ Identical | ${{ env.IDENTICAL }} |
          | ‚ùå Different | ${{ env.DIFFERENT }} |
          | Only in serial | ${{ env.ONLY_SERIAL }} |
          | Only in parallel | ${{ env.ONLY_PARALLEL }} |

          $DIFF_CONTENT

          ---

          ## üìä Phase Analysis (parallel-rustc)

          | Metric | Value |
          |---|---|
          | Total packages | ${{ env.PACKAGES }} |
          | Phases (min serial depth) | ${{ env.PHASES }} |
          | Max phase width | ${{ env.MAX_WIDTH }} |
          | Theoretical max parallelism | ${{ env.THEORETICAL }}√ó |

          ## Phase Plan

          \`\`\`
          $PLAN_CONTENT
          \`\`\`
          REPORT
