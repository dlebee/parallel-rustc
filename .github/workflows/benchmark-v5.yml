name: benchmark-v5

on:
  push:
    branches: [feature/v5-wrapper, main]
  workflow_dispatch:

jobs:
  bench-cargo:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout parallel-rustc
        uses: actions/checkout@v4

      - name: Install Rust stable (1.94.0)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: Install build deps (for rust-lang/cargo)
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Build parallel-rustc (release)
        run: cargo build --release

      - name: Clone rust-lang/cargo
        run: git clone --depth=1 https://github.com/rust-lang/cargo /tmp/cargo-src

      - name: Baseline — cargo build (default -j)
        id: baseline
        run: |
          cd /tmp/cargo-src
          cargo clean
          START=$SECONDS
          cargo build 2>&1 | tail -5
          BASELINE_S=$((SECONDS - START))
          echo "baseline_s=$BASELINE_S" >> $GITHUB_OUTPUT
          echo "### Baseline: cargo build (default -j)" >> $GITHUB_STEP_SUMMARY
          echo "Time: **${BASELINE_S}s** on $(nproc) CPUs" >> $GITHUB_STEP_SUMMARY

      - name: v5 — parallel-rustc build-v5
        id: v5
        run: |
          cd /tmp/cargo-src
          cargo clean
          START=$SECONDS
          $GITHUB_WORKSPACE/target/release/parallel-rustc build-v5 \
            --manifest-path Cargo.toml \
            --jobs $(nproc) 2>&1 | tee /tmp/v5-output.txt
          V5_S=$((SECONDS - START))
          echo "v5_s=$V5_S" >> $GITHUB_OUTPUT
          echo "### v5: parallel-rustc build-v5" >> $GITHUB_STEP_SUMMARY
          echo "Time: **${V5_S}s** on $(nproc) CPUs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -v "^   Compiling\|^    Finished" /tmp/v5-output.txt | tail -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Summary
        run: |
          BASELINE=${{ steps.baseline.outputs.baseline_s }}
          V5=${{ steps.v5.outputs.v5_s }}
          RATIO=$(python3 -c "print(f'{$BASELINE/$V5:.2f}')")
          echo "## Result" >> $GITHUB_STEP_SUMMARY
          echo "| | Time | Speedup |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| cargo build (default) | ${BASELINE}s | 1.00x |" >> $GITHUB_STEP_SUMMARY
          echo "| parallel-rustc v5 | ${V5}s | ${RATIO}x |" >> $GITHUB_STEP_SUMMARY
          echo "Baseline: ${BASELINE}s | v5: ${V5}s | speedup: ${RATIO}x"
