name: Rigorous Equivalence — Single Machine

# Both builds run on the SAME runner:
# 1. cargo build -j1   (serial baseline, timed)
# 2. cargo build -jN   (cargo parallel, timed)
# 3. Compare ASM — proves correctness (same machine = no LLVM drift)

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'Public GitHub repo URL'
        required: true
        type: string
      repo_branch:
        description: 'Branch (leave blank for default)'
        required: false
        default: ''
        type: string
      manifest_path:
        description: 'Path to Cargo.toml (default: Cargo.toml)'
        required: false
        default: 'Cargo.toml'
        type: string
      rust_toolchain:
        description: 'Rust toolchain (default: stable)'
        required: false
        default: 'stable'
        type: string
      build_workspace:
        description: 'Pass --workspace to build all crates (default: false)'
        required: false
        default: 'false'
        type: string

jobs:
  equivalence:
    name: Serial vs Parallel — Build + ASM Compare
    runs-on: ubuntu-latest
    steps:
      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler libclang-dev cmake

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust_toolchain }}

      - name: Clone target repo
        run: |
          if [ -n "${{ inputs.repo_branch }}" ]; then
            git clone --depth 1 --branch ${{ inputs.repo_branch }} ${{ inputs.repo_url }} target-repo
          else
            git clone --depth 1 ${{ inputs.repo_url }} target-repo
          fi

      - name: Build 1 — Serial (-j1)
        working-directory: target-repo
        env:
          CARGO_TARGET_DIR: target-serial
          RUSTFLAGS: "--remap-path-prefix=${{ github.workspace }}/target-repo=."
        run: |
          WORKSPACE=$( [ "${{ inputs.build_workspace }}" = "true" ] && echo "--workspace" )
          echo "=== Serial build (-j1) ==="
          START=$(date +%s)
          cargo build --release -j1 --manifest-path ${{ inputs.manifest_path }} $WORKSPACE 2>&1
          SERIAL_S=$(( $(date +%s) - START ))
          echo "Serial time: ${SERIAL_S}s"
          echo "SERIAL_S=${SERIAL_S}" >> ../timings.txt

      - name: Emit ASM — Serial
        working-directory: target-repo
        env:
          CARGO_TARGET_DIR: target-serial
          RUSTFLAGS: "--remap-path-prefix=${{ github.workspace }}/target-repo=. --emit=asm"
        run: |
          WORKSPACE=$( [ "${{ inputs.build_workspace }}" = "true" ] && echo "--workspace" )
          cargo build --release -j1 --manifest-path ${{ inputs.manifest_path }} $WORKSPACE 2>&1 | grep -v "^$" || true
          mkdir -p ../asm-serial
          find target-serial/release/deps -name "*.s" | while read f; do
            clean=$(basename "$f" | sed 's/-[a-f0-9]\{16\}\.s$/.s/')
            cp "$f" "../asm-serial/${clean}"
          done
          echo "Serial ASM files: $(ls ../asm-serial | wc -l)"

      - name: Build 2 — Parallel (default -j)
        working-directory: target-repo
        env:
          CARGO_TARGET_DIR: target-parallel
          RUSTFLAGS: "--remap-path-prefix=${{ github.workspace }}/target-repo=."
        run: |
          WORKSPACE=$( [ "${{ inputs.build_workspace }}" = "true" ] && echo "--workspace" )
          CPUS=$(nproc)
          echo "=== Parallel build (${CPUS} CPUs) ==="
          START=$(date +%s)
          cargo build --release --manifest-path ${{ inputs.manifest_path }} $WORKSPACE 2>&1
          PARALLEL_S=$(( $(date +%s) - START ))
          echo "Parallel time: ${PARALLEL_S}s (${CPUS} CPUs)"
          echo "PARALLEL_S=${PARALLEL_S}" >> ../timings.txt
          echo "CPUS=${CPUS}" >> ../timings.txt

      - name: Emit ASM — Parallel
        working-directory: target-repo
        env:
          CARGO_TARGET_DIR: target-parallel
          RUSTFLAGS: "--remap-path-prefix=${{ github.workspace }}/target-repo=. --emit=asm"
        run: |
          WORKSPACE=$( [ "${{ inputs.build_workspace }}" = "true" ] && echo "--workspace" )
          cargo build --release --manifest-path ${{ inputs.manifest_path }} $WORKSPACE 2>&1 | grep -v "^$" || true
          mkdir -p ../asm-parallel
          find target-parallel/release/deps -name "*.s" | while read f; do
            clean=$(basename "$f" | sed 's/-[a-f0-9]\{16\}\.s$/.s/')
            cp "$f" "../asm-parallel/${clean}"
          done
          echo "Parallel ASM files: $(ls ../asm-parallel | wc -l)"

      - name: Compare ASM
        run: |
          source timings.txt
          SERIAL_COUNT=$(ls asm-serial 2>/dev/null | wc -l)
          PARALLEL_COUNT=$(ls asm-parallel 2>/dev/null | wc -l)
          IDENTICAL=0; DIFFERENT=0; ONLY_SERIAL=0; ONLY_PARALLEL=0

          for f in $(ls asm-serial/*.s 2>/dev/null); do
            base=$(basename "$f")
            if [ ! -f "asm-parallel/$base" ]; then
              ONLY_SERIAL=$((ONLY_SERIAL + 1))
            else
              if diff <(grep -v '^\s*$\|^\s*[;#]' "$f") \
                      <(grep -v '^\s*$\|^\s*[;#]' "asm-parallel/$base") > /dev/null 2>&1; then
                IDENTICAL=$((IDENTICAL + 1))
              else
                DIFFERENT=$((DIFFERENT + 1))
              fi
            fi
          done

          for f in $(ls asm-parallel/*.s 2>/dev/null); do
            base=$(basename "$f")
            [ ! -f "asm-serial/$base" ] && ONLY_PARALLEL=$((ONLY_PARALLEL + 1))
          done

          if [ "${PARALLEL_S:-0}" -gt 0 ]; then
            SPEEDUP=$(echo "scale=2; ${SERIAL_S:-0} / $PARALLEL_S" | bc || echo "?")
          else
            SPEEDUP="?"
          fi

          [ "$DIFFERENT" -eq 0 ] && [ "$ONLY_SERIAL" -eq 0 ] && [ "$ONLY_PARALLEL" -eq 0 ] \
            && VERDICT="✅ IDENTICAL" || VERDICT="⚠️ DIFFERENCES FOUND"

          cat >> $GITHUB_STEP_SUMMARY << REPORT
          # 🏁 Results

          **Target:** \`${{ inputs.repo_url }}\`
          **Branch:** \`${{ inputs.repo_branch || 'default' }}\`
          **Manifest:** \`${{ inputs.manifest_path }}\`
          **Toolchain:** \`${{ inputs.rust_toolchain }}\`
          **CPUs:** ${CPUS:-?}

          ## ⏱️ Timings

          | Mode | Time |
          |---|---|
          | Serial (\`-j1\`) | **${SERIAL_S:-?}s** |
          | Parallel (default) | **${PARALLEL_S:-?}s** |
          | **Speedup** | **${SPEEDUP}×** |

          ## 🔬 ASM Equivalence

          **${VERDICT}**

          | Metric | Value |
          |---|---|
          | Serial ASM files | ${SERIAL_COUNT} |
          | Parallel ASM files | ${PARALLEL_COUNT} |
          | ✅ Identical | ${IDENTICAL} |
          | ❌ Different | ${DIFFERENT} |
          | Only serial | ${ONLY_SERIAL} |
          | Only parallel | ${ONLY_PARALLEL} |
          REPORT

          echo ""
          echo "=== Summary ==="
          echo "Serial:   ${SERIAL_S}s"
          echo "Parallel: ${PARALLEL_S}s (${SPEEDUP}× faster)"
          echo "ASM: ${VERDICT} (${IDENTICAL}/${SERIAL_COUNT} identical)"
